name: SCA
on:
  push:
    branches: ["master", "v6"]
  pull_request:
    branches: ["master", "v6"]
jobs:
  snyk-cli:
    uses: auth0/devsecops-tooling/.github/workflows/sca-scan.yml@main
    with:
      ruby-version: "3.4"
      additional-arguments: "--exclude=README.md,.jfrog,examples"
      pre-scan-commands: |
        bundle install
    secrets: inherit